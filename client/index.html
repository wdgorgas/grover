<!doctype html>
<html lang="en" data-theme="default">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GROVER</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%234cc9f0' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%237b2ff7'/%3E%3C/svg%3E">
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-orb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8.5"/><ellipse cx="12" cy="12" rx="8.5" ry="3.4"/></symbol>
      <symbol id="i-builder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14.5 5.5 18.5 9.5 8 20H4v-4L14.5 5.5Z"/><path d="m13 7 4 4"/></symbol>
      <symbol id="i-ledger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 4h14v16H5z"/><path d="M9 8.5h7M9 12h7M9 15.5h4"/></symbol>
      <symbol id="i-memory" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 4c-4 0-6.5 2.2-6.5 5.5 0 2 .9 3.4 2.2 4.3L7 20l3.4-2h1.6c4 0 6.5-2.2 6.5-5.5S16 4 12 4Z"/></symbol>
      <symbol id="i-costs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19h16M7 16V9m5 7V5m5 11v-6"/></symbol>
      <symbol id="i-skills" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m12 3 2.2 5.3L20 9.2l-4.4 3.8 1.4 5.7L12 15.6l-5 3.1 1.4-5.7L4 9.2l5.8-.9L12 3Z"/></symbol>
      <symbol id="i-audit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4.2 4.2"/></symbol>
      <symbol id="i-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M12 4.5V3m0 18v-1.5M6.7 6.7 5.6 5.6m12.8 12.8-1.1-1.1M4.5 12H3m18 0h-1.5M6.7 17.3l-1.1 1.1M18.4 5.6l-1.1 1.1"/></symbol>
      <symbol id="i-desk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3.5"/><circle cx="12" cy="12" r="8" stroke-dasharray="3.5 4"/></symbol>
    </defs>
  </svg>

  <div id="shell">
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-mark"><span></span></div>
        <div class="brand-text">
          <div class="brand-name">GROVER</div>
          <div class="brand-sub">command center</div>
        </div>
      </div>

      <nav id="nav">
        <a href="#command" data-view="command"><svg><use href="#i-orb"/></svg> Command Center</a>
        <a href="#builder" data-view="builder"><svg><use href="#i-builder"/></svg> Builder</a>
        <a href="#ledger" data-view="ledger"><svg><use href="#i-ledger"/></svg> Ledger</a>
        <a href="#memory" data-view="memory"><svg><use href="#i-memory"/></svg> Memory Vault</a>
      </nav>

      <div class="nav-group">
        <div class="nav-label">Desks</div>
        <nav class="nav-list" id="desk-nav"></nav>
      </div>

      <div class="nav-group nav-flex">
        <div class="nav-label">System</div>
        <nav class="nav-list">
          <a href="#costs" data-view="costs"><svg><use href="#i-costs"/></svg> Costs</a>
          <a href="#skills" data-view="skills"><svg><use href="#i-skills"/></svg> Skills</a>
          <a href="#audit" data-view="audit"><svg><use href="#i-audit"/></svg> Audit</a>
          <a href="#settings" data-view="settings"><svg><use href="#i-settings"/></svg> Settings</a>
        </nav>
      </div>

      <div id="user-chip" title="Switch profile in Settings">
        <div class="avatar" id="user-avatar">W</div>
        <div class="user-meta">
          <div id="user-name">—</div>
          <div id="user-role" class="dim">admin</div>
        </div>
      </div>
    </aside>

    <main id="main">
      <!-- Command Center (kept mounted so the orb never re-initializes) -->
      <section id="view-command" class="view">
        <div id="command-layout">
          <div id="command-core">
            <div id="orb-wrap">
              <canvas id="orb" width="520" height="520"></canvas>
              <div id="orb-status">
                <span id="orb-state-label">Idle</span>
                <span id="orb-state-detail" class="dim"></span>
              </div>
            </div>
            <div id="chat-log" class="chat-log" aria-live="polite"></div>
            <div id="composer" class="composer">
              <div class="composer-toolbar">
                <div class="seg" id="mode-seg">
                  <button data-mode="chat" class="on">Chat</button>
                  <button data-mode="brain_dump">Brain Dump</button>
                </div>
                <select id="tier-select" class="pill-select" title="Model tier">
                  <option value="">Auto</option>
                  <option value="fast">Fast · Haiku</option>
                  <option value="smart">Smart · Sonnet</option>
                  <option value="frontier">Frontier · Opus</option>
                  <option value="fable">Fable · max</option>
                </select>
                <button id="new-chat" class="ghost" title="Start a new conversation">＋ New</button>
              </div>
              <div class="composer-row">
                <textarea id="chat-input" class="chat-input" rows="1" placeholder="Talk to Grover…"></textarea>
                <button id="send-btn" class="send-btn" title="Send (Enter)">▶</button>
              </div>
            </div>
          </div>
          <aside id="context-panel">
            <h3>Telemetry</h3>
            <div class="tele-grid">
              <div class="tele"><label>Today</label><span id="tele-today">$0.00</span></div>
              <div class="tele"><label>Model</label><span id="tele-model">—</span></div>
              <div class="tele"><label>Tier</label><span id="tele-tier">—</span></div>
              <div class="tele"><label>Last turn</label><span id="tele-cost">—</span></div>
              <div class="tele"><label>Latency</label><span id="tele-latency">—</span></div>
              <div class="tele"><label>Autonomy</label><span id="tele-autonomy">L1</span></div>
            </div>
            <h3>System</h3>
            <div id="sys-mini" class="small dim">…</div>
            <h3>Memory injected</h3>
            <div id="tele-memories" class="dim small">none yet</div>
            <h3>Recent conversations</h3>
            <div id="conv-list"></div>
          </aside>
        </div>
      </section>

      <!-- All other views render here -->
      <section id="view-generic" class="view" hidden>
        <div id="view"></div>
      </section>
    </main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
